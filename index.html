  raw = raw.trim();
  const m = raw.match(/半磅[^\d]*(\d+)[^一\/]*[一\/]?[磅]?[^\d]*(\d+)?/);
  if (m) return { half: m[1] || "", one: m[2] || "" };
  const single = raw.match(/(\d+)/);
  return { half: "", one: single ? single[1] : raw };
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur); cur = ""; continue; }
      cur += c;
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
    const pp = parsePrice(obj.price || "");
    return {
      region: obj.region || "",
      name: obj.name || "",
      process: obj.process || "",
      notes: obj.notes || "",
      half: obj.half || pp.half,
      one: obj.one || pp.one,
      soldOut: (obj.soldOut || "").toUpperCase() === "TRUE",
      presale: (obj.presale || "").toUpperCase() === "TRUE",
      award: (obj.award || "").toUpperCase() === "TRUE",
    };
  }).filter(d => d.name);
}

function buildPriceHTML(d) {
  if (d.soldOut) return `<span class="price-single" style="color:var(--text-muted)">售完</span>`;
  if (d.half && d.one) return `
    <div class="price-block">
      <div class="price-row"><span class="price-label">半磅</span><span class="price-value">$${d.half}</span></div>
      <div class="price-row"><span class="price-label">一磅</span><span class="price-value">$${d.one}</span></div>
    </div>`;
  if (d.one) return `<div class="price-block"><div class="price-row"><span class="price-value">$${d.one}</span></div></div>`;
  if (d.half) return `<div class="price-block"><div class="price-row"><span class="price-label">半磅</span><span class="price-value">$${d.half}</span></div></div>`;
  return "";
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = allData.filter(d => {
    const rm = activeRegion === "全部" || d.region === activeRegion;
    const sm = !q || d.name.toLowerCase().includes(q) || d.notes.toLowerCase().includes(q) || d.process.includes(q) || d.region.includes(q);
    return rm && sm;
  });
  document.getElementById("count-bar").textContent = `共 ${filtered.length} 款`;
  const list = document.getElementById("list");
  if (!filtered.length) { list.innerHTML = '<div class="no-result">找不到符合的咖啡豆</div>'; return; }
  list.innerHTML = filtered.map(d => `
    <div class="item${d.soldOut ? " sold-out" : ""}">
      <div class="item-top">
        <div class="item-name">${d.name}</div>
        ${buildPriceHTML(d)}
      </div>
      <div class="item-tags">
        <span class="tag process">${d.process}</span>
        ${d.soldOut ? '<span class="tag sold">售完</span>' : ""}
        ${d.presale && !d.soldOut ? '<span class="tag presale">預訂制</span>' : ""}
        ${d.award ? '<span class="tag award">★ 精選</span>' : ""}
      </div>
      <div class="item-notes">${d.notes}</div>
    </div>`).join("");
}

function setTab(r) {
  activeRegion = r;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.r === r));
  render();
}

function buildTabs() {
  const tabs = document.getElementById("tabs");
  REGIONS.forEach(r => {
    const t = document.createElement("div");
    t.className = "tab" + (r === "全部" ? " active" : "");
    t.dataset.r = r; t.textContent = r;
    t.onclick = () => setTab(r);
    tabs.appendChild(t);
  });
}

async function init() {
  buildTabs();
  if (SHEET_CSV_URL) {
    try {
      const res = await fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(SHEET_CSV_URL));
      const text = await res.text();
      allData = parseCSV(text);
    } catch(e) {
      console.warn("無法讀取 Google Sheets，使用靜態資料", e);
      allData = STATIC_DATA;
    }
  } else {
    allData = STATIC_DATA;
  }
  render();
}

init();
</script>
</body>
</html>
