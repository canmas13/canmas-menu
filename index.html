:root {
  --bg:          #111E4A;
  --bg-1:        #162258;
  --bg-2:        #1A2A6A;
  --bg-3:        #1F3278;
  --bg-4:        #253C8C;
  --cobalt:      #1A3FC8;
  --cobalt-bright:#2952D8;
  --gold:        #D4A843;
  --gold-light:  #EFC76A;
  --gold-pale:   #F7E9C4;
  --cream:       #EEE8D8;
  --silver:      #B8C8E8;
  --silver-dim:  #6878A8;
  --silver-dark: #364070;
  --line-green:  #06C755;
  --danger:      #E05555;
  --border-gold: rgba(212,168,67,0.28);
  --border-blue: rgba(184,200,232,0.12);
  --border-soft: rgba(184,200,232,0.08);

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--cream);font-family:'Noto Serif TC',serif;min-height:100vh;-webkit-font-smoothing:antialiased;}

.header{background:var(--bg-1);border-bottom:1px solid var(--border-gold);padding:1.5rem 1.5rem 1.25rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:680px;margin:0 auto;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.brand-name{font-family:'Cinzel',serif;font-size:26px;font-weight:500;letter-spacing:0.1em;color:var(--gold);}
.brand-sub{font-size:13px;color:var(--silver-dim);letter-spacing:0.15em;margin-top:4px;}
.line-btn{display:flex;align-items:center;gap:7px;background:var(--line-green);color:#fff;border:none;border-radius:28px;padding:10px 18px;font-size:14px;font-weight:500;font-family:'Noto Serif TC',serif;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:opacity 0.15s,transform 0.1s;}
.line-btn:hover{opacity:0.88;}
.line-btn:active{transform:scale(0.97);}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
.search-input{width:100%;background:var(--bg-3);border:1px solid var(--border-blue);border-radius:10px;color:var(--cream);font-family:'Noto Serif TC',serif;font-size:15px;padding:11px 14px 11px 38px;outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--silver-dark);}
.search-input:focus{border-color:rgba(212,168,67,0.5);}

/* ── TABS ── */
.tabs-wrap{background:var(--bg-1);border-bottom:1px solid var(--border-gold);overflow-x:auto;scrollbar-width:none;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;padding:0 1.5rem;max-width:680px;margin:0 auto;}
.tab{padding:13px 16px;font-size:15px;font-family:'Noto Serif TC',serif;color:var(--silver-dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.15s;letter-spacing:0.05em;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--silver);}

/* ── COUNT BAR ── */
.count-bar{padding:8px 1.5rem;font-size:12px;color:var(--silver-dark);background:var(--bg-2);border-bottom:1px solid var(--border-soft);}
.count-bar-inner{max-width:680px;margin:0 auto;}

/* ── ITEM LIST ── */
.list{padding-bottom:9rem;max-width:680px;margin:0 auto;}
.item{padding:20px 1.5rem;border-bottom:1px solid var(--border-soft);transition:background 0.12s;}
.item:hover{background:var(--bg-2);}
.item.sold-out{opacity:0.3;}

.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.item-name{font-size:16px;font-weight:500;color:var(--cream);line-height:1.5;flex:1;letter-spacing:0.02em;}

.price-block{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.price-row{display:flex;align-items:center;gap:6px;}
.price-label{font-size:11px;color:var(--silver-dim);letter-spacing:0.05em;}
.price-value{font-size:15px;color:var(--gold-light);font-weight:500;white-space:nowrap;}

.item-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border-blue);color:var(--silver-dim);background:var(--bg-3);letter-spacing:0.03em;}

.tag.sold{color:#F08080;border-color:rgba(224,85,85,0.35);background:rgba(224,85,85,0.08);}
.tag.presale{color:#F0C870;border-color:rgba(240,200,112,0.35);background:rgba(240,200,112,0.07);}
.tag.award{color:var(--gold-light);border-color:rgba(212,168,67,0.35);background:rgba(212,168,67,0.07);}

.item-notes{font-size:14px;color:var(--silver);line-height:1.8;margin-bottom:12px;}

/* ── ADD ROW ── */
.add-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.size-select{background:var(--bg-3);border:1px solid var(--border-blue);border-radius:8px;color:var(--cream);font-family:'Noto Serif TC',serif;font-size:13px;padding:7px 10px;outline:none;cursor:pointer;transition:border-color 0.2s;}

.qty-wrap{display:flex;align-items:center;gap:5px;}
.qty-btn{width:30px;height:30px;background:var(--bg-3);border:1px solid var(--border-blue);border-radius:7px;color:var(--cream);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s,background 0.15s;}
.qty-btn:hover{background:var(--bg-4);border-color:var(--gold);}
.qty-val{font-size:14px;color:var(--cream);min-width:22px;text-align:center;}
.add-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--gold-light);border-radius:8px;color:var(--gold-light);font-family:'Noto Serif TC',serif;font-size:13px;padding:7px 14px;cursor:pointer;transition:background 0.15s;}
.add-btn:hover{background:rgba(212,168,67,0.12);}
.added-label{font-size:12px;color:var(--line-green);display:none;}

/* ── CART FAB ── */
.cart-fab{position:fixed;bottom:1.75rem;right:1.5rem;z-index:200;display:flex;align-items:center;gap:9px;background:var(--gold);color:var(--bg);border:none;border-radius:32px;padding:14px 22px;font-size:15px;font-weight:500;font-family:'Noto Serif TC',serif;cursor:pointer;box-shadow:0 6px 24px rgba(212,168,67,0.45);transition:opacity 0.15s,transform 0.1s;}

.cart-fab:active{transform:scale(0.97);}
.cart-badge{background:var(--danger);color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:500;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(8,14,40,0.88);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.show{opacity:1;pointer-events:all;}

/* ── CART PANEL ── */
.cart-panel{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;background:var(--bg-1);border-top:1px solid var(--border-gold);border-radius:22px 22px 0 0;z-index:400;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:92vh;overflow-y:auto;}
.cart-panel.show{transform:translateY(0);}
.cart-header{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.5rem 1.1rem;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg-1);z-index:1;}
.cart-title{font-size:17px;font-weight:500;color:var(--cream);letter-spacing:0.05em;}
.cart-close{background:none;border:none;color:var(--silver-dim);font-size:24px;cursor:pointer;padding:0 4px;line-height:1;}
.cart-close:hover{color:var(--cream);}
.cart-items{padding:0.75rem 1.5rem;}
.cart-item{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-soft);gap:10px;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:14px;color:var(--cream);line-height:1.5;}
.cart-item-detail{font-size:12px;color:var(--silver-dim);margin-top:3px;}
.cart-item-subtotal{font-size:13px;color:var(--gold-light);margin-top:3px;}
.cart-item-remove{background:none;border:none;color:var(--silver-dark);cursor:pointer;font-size:20px;padding:0 4px;flex-shrink:0;}
.cart-item-remove:hover{color:var(--danger);}
.cart-empty{padding:2.5rem;text-align:center;color:var(--silver-dark);font-size:14px;line-height:1.8;}

.cart-total{padding:14px 1.5rem;border-top:1px solid var(--border-gold);display:flex;justify-content:space-between;align-items:center;background:var(--bg-2);}
.cart-total-label{font-size:14px;color:var(--silver);}
.cart-total-amount{font-size:20px;color:var(--gold);font-weight:500;}

.order-form{padding:1.25rem 1.5rem 2rem;border-top:1px solid var(--border-soft);}
.form-section-title{font-size:14px;color:var(--silver-dim);margin-bottom:1.1rem;padding-bottom:8px;border-bottom:1px solid var(--border-soft);letter-spacing:0.05em;}

.form-input::placeholder{color:var(--silver-dark);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.submit-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:11px;padding:15px;font-size:16px;font-weight:500;font-family:'Noto Serif TC',serif;cursor:pointer;margin-top:6px;transition:opacity 0.15s;letter-spacing:0.05em;}

.submit-note{font-size:12px;color:var(--silver-dark);text-align:center;margin-top:10px;line-height:1.7;}

.footer{padding:2.5rem 1.5rem;border-top:1px solid var(--border-gold);text-align:center;max-width:680px;margin:0 auto;}

.footer-links a:hover{color:var(--gold);}
.footer-meta{font-size:12px;color:var(--silver-dark);}
.no-result{padding:4rem 1.5rem;text-align:center;color:var(--silver-dark);font-size:15px;}
</style>

const REGIONS=["全部","中美洲","南美洲","非洲","太平洋","亞產區","職人精選","精選濾掛"];
let activeRegion="全部",allData=[],cart=[];

function parsePrice(raw){
  if(!raw)return{half:"",one:""};
  const m=raw.match(/半磅[^\d]*(\d+)[^一\/]*[一\/]?[磅]?[^\d]*(\d+)?/);
  if(m)return{half:m[1]||"",one:m[2]||""};
  const s=raw.match(/(\d+)/);
  return{half:"",one:s?s[1]:raw};
}

function buildPriceHTML(d){
  if(d.soldOut)return`<span style="font-size:14px;color:var(--silver-dark)">售完</span>`;
  if(d.half&&d.one)return`<div class="price-block"><div class="price-row"><span class="price-label">半磅</span><span class="price-value">$${d.half}</span></div><div class="price-row"><span class="price-label">一磅</span><span class="price-value">$${d.one}</span></div></div>`;
  if(d.one)return`<div class="price-block"><div class="price-row"><span class="price-value">$${d.one}</span></div></div>`;
  if(d.half)return`<div class="price-block"><div class="price-row"><span class="price-label">半磅</span><span class="price-value">$${d.half}</span></div></div>`;
  return"";
}

function buildSizeOptions(d){
  const o=[];
  if(d.half)o.push(`<option value="半磅|${d.half}">半磅 $${d.half}</option>`);
  if(d.one)o.push(`<option value="一磅|${d.one}">一磅 $${d.one}</option>`);
  return o.join("");
}

const qtyMap={};
function getQty(idx){return qtyMap[idx]||1;}
function setQty(idx,v){qtyMap[idx]=Math.max(1,v);const el=document.getElementById(`qty-${idx}`);if(el)el.textContent=qtyMap[idx];}

function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const f=allData.filter(d=>{
    const rm=activeRegion==="全部"||d.region===activeRegion;
    const sm=!q||d.name.toLowerCase().includes(q)||d.notes.toLowerCase().includes(q)||d.process.includes(q)||d.region.includes(q);
    return rm&&sm;
  });
  document.getElementById("count-bar").textContent=`共 ${f.length} 款`;
  const list=document.getElementById("list");
  if(!f.length){list.innerHTML='<div class="no-result">找不到符合的咖啡豆</div>';return;}
  list.innerHTML=f.map(d=>{
    const idx=allData.indexOf(d);
    const canAdd=!d.soldOut&&(d.half||d.one);
    return`<div class="item${d.soldOut?" sold-out":""}">
      <div class="item-top"><div class="item-name">${d.name}</div>${buildPriceHTML(d)}</div>
      <div class="item-tags">
        <span class="tag process">${d.process}</span>
        ${d.soldOut?'<span class="tag sold">售完</span>':""}
        ${d.presale&&!d.soldOut?'<span class="tag presale">預訂制</span>':""}
        ${d.award?'<span class="tag award">★ 精選</span>':""}
      </div>
      <div class="item-notes">${d.notes}</div>
      ${canAdd?`<div class="add-row">
        <select class="size-select" id="size-${idx}">${buildSizeOptions(d)}</select>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="setQty(${idx},getQty(${idx})-1)">−</button>
          <span class="qty-val" id="qty-${idx}">1</span>
          <button class="qty-btn" onclick="setQty(${idx},getQty(${idx})+1)">+</button>
        </div>
        <button class="add-btn" onclick="addToCart(${idx})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          加入購物清單
        </button>
        <span class="added-label" id="added-${idx}">✓ 已加入</span>
      </div>`:""}
    </div>`;
  }).join("");
}

function addToCart(idx){
  const d=allData[idx];
  const sel=document.getElementById(`size-${idx}`);
  const[size,price]=sel.value.split("|");
  const qty=getQty(idx);
  const exist=cart.find(c=>c.name===d.name&&c.size===size);
  if(exist){exist.qty+=qty;}else{cart.push({name:d.name,size,price:Number(price),qty});}
  updateCartBadge();
  const lbl=document.getElementById(`added-${idx}`);
  if(lbl){lbl.style.display="inline";setTimeout(()=>lbl.style.display="none",1500);}
}

function removeFromCart(i){cart.splice(i,1);updateCartBadge();renderCartBody();}
function cartTotal(){return cart.reduce((s,c)=>s+c.price*c.qty,0);}

function updateCartBadge(){
  const fab=document.getElementById("cartFab");
  const total=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById("cartBadge").textContent=total;
  fab.style.display=total>0?"flex":"none";
}

function openCart(){renderCartBody();document.getElementById("overlay").classList.add("show");document.getElementById("cartPanel").classList.add("show");}
function closeCart(){document.getElementById("overlay").classList.remove("show");document.getElementById("cartPanel").classList.remove("show");}

function renderCartBody(){
  const el=document.getElementById("cartBody");
  if(!cart.length){el.innerHTML=`<div class="cart-empty">購物清單是空的<br><span style="font-size:12px">點選豆款旁的「加入購物清單」開始選購</span></div>`;return;}
  const total=cartTotal();
  el.innerHTML=`
    <div class="cart-items">${cart.map((c,i)=>`
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-detail">${c.size} × ${c.qty}</div>
          <div class="cart-item-subtotal">$${(c.price*c.qty).toLocaleString()}</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${i})">×</button>
      </div>`).join("")}
    </div>
    <div class="cart-total">
      <span class="cart-total-label">合計（未含運費）</span>
      <span class="cart-total-amount">$${total.toLocaleString()}</span>
    </div>
    <div class="order-form">
      <div class="form-section-title">收件資訊</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">姓名 <span>*</span></label><input class="form-input" id="f-name" type="text" placeholder="您的姓名"></div>
        <div class="form-group"><label class="form-label">聯絡電話 <span>*</span></label><input class="form-input" id="f-phone" type="tel" placeholder="09xx-xxx-xxx"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="f-email" type="email" placeholder="your@email.com（選填）"></div>
      <div class="form-group"><label class="form-label">寄送地址 <span>*</span></label><input class="form-input" id="f-addr" type="text" placeholder="縣市、鄉鎮市區、路段門號"></div>
      <div class="form-group"><label class="form-label">備註</label><input class="form-input" id="f-note" type="text" placeholder="烘焙度偏好、包裝需求…"></div>
      <button class="submit-btn" onclick="submitOrder()">確認送出訂單</button>
      <div class="submit-note">送出後將開啟 LINE 與您確認，並回覆付款方式與出貨時程</div>
    </div>`;
}

function genOrderNo(){
  const d=new Date();
  return`CM${d.getFullYear().toString().slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;
}

async function submitOrder(){
  const name=document.getElementById("f-name").value.trim();
  const phone=document.getElementById("f-phone").value.trim();
  const email=document.getElementById("f-email").value.trim();
  const addr=document.getElementById("f-addr").value.trim();
  const note=document.getElementById("f-note").value.trim();
  if(!name||!phone||!addr){alert("請填寫姓名、電話及寄送地址");return;}

  const btn=document.querySelector(".submit-btn");
  btn.disabled=true;btn.textContent="處理中…";

  const orderNo=genOrderNo();
  const ts=new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"});
  const itemsText=cart.map(c=>`${c.name}（${c.size}×${c.qty}）`).join("、");
  const total=cartTotal();

  let paymentURL="";

  if(APPS_SCRIPT_URL){
    try{
      // 使用 cors proxy 取得付款連結
      const res=await fetch("https://api.codetabs.com/v1/proxy?quest="+
        encodeURIComponent(APPS_SCRIPT_URL),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({orderNo,timestamp:ts,name,phone,email,address:addr,items:itemsText,total,note,status:"待付款"})
      });
      const json=await res.json();
      if(json.paymentURL) paymentURL=json.paymentURL;
    }catch(e){
      console.warn("Apps Script呼叫失敗，改用LINE通知",e);
    }
  }

  cart=[];updateCartBadge();

  // 成功畫面
  const payBtn=paymentURL
    ?`<a href="${paymentURL}" target="_blank" style="display:inline-block;margin-top:16px;background:#D4A843;color:#111E4A;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:500;text-decoration:none;font-family:'Noto Serif TC',serif;cursor:pointer;">立即前往付款 →</a>`
    :`<div style="font-size:12px;color:#6878A8;margin-top:12px">付款連結將透過 LINE 傳送給您</div>`;

  document.getElementById("cartBody").innerHTML=`
    <div class="success-panel">
      <div class="success-icon">✓</div>
      <div class="success-title">訂單已建立！</div>
      <div class="success-msg">請點下方按鈕前往綠界付款<br>付款完成後我們將盡快安排出貨</div>
      <div class="order-num">訂單編號：${orderNo}</div>
      ${payBtn}
    </div>`;
}

function setTab(r){activeRegion=r;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.r===r));render();}

function buildTabs(){
  const tabs=document.getElementById("tabs");
  REGIONS.forEach(r=>{
    const t=document.createElement("div");
    t.className="tab"+(r==="全部"?" active":"");
    t.dataset.r=r;t.textContent=r;t.onclick=()=>setTab(r);
    tabs.appendChild(t);
  });
}

function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  return lines.slice(1).map(line=>{
    const cols=[];let cur="",inQ=false;
    for(let c of line){if(c==='"'){inQ=!inQ;continue;}if(c===','&&!inQ){cols.push(cur);cur="";continue;}cur+=c;}
    cols.push(cur);
    const obj={};headers.forEach((h,i)=>obj[h]=(cols[i]||"").trim());
    const pp=parsePrice(obj.price||"");
    return{region:obj.region||"",name:obj.name||"",process:obj.process||"",notes:obj.notes||"",
      half:obj.half||pp.half,one:obj.one||pp.one,
      soldOut:(obj.soldOut||"").toUpperCase()==="TRUE",
      presale:(obj.presale||"").toUpperCase()==="TRUE",
      award:(obj.award||"").toUpperCase()==="TRUE"};
  }).filter(d=>d.name);
}

async function init(){
  buildTabs();
  if(SHEET_CSV_URL){
    try{const res=await fetch("https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(SHEET_CSV_URL));allData=parseCSV(await res.text());}
    catch(e){console.warn("使用靜態資料",e);allData=STATIC_DATA;}
  }else{allData=STATIC_DATA;}
  render();
}
init();
